version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./backend/paper_scout.db:/app/paper_scout.db
      - ./backend/chroma_data:/app/chroma_data
      - hf_cache:/root/.cache/huggingface
    environment:
      - PAPER_SCOUT_DB_URL=sqlite:///paper_scout.db
      - PAPER_SCOUT_CHROMA_PATH=./chroma_data
      - PAPER_SCOUT_CORS_ORIGINS=http://localhost:5173,http://127.0.0.1:5173

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://127.0.0.1:8001
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  hf_cache:
